# =====================================================================
# OpenProject Rewrite — production docker-compose
# =====================================================================
# Single-host production stack. For Kubernetes/Swarm, port this to
# Helm/Compose-on-K8s equivalents.
#
# Usage:
#   cp .env.production.example .env.production  # fill in real values
#   docker compose --env-file .env.production -f docker-compose.yml up -d
#   docker compose logs -f app                   # tail app logs
#   docker compose exec app npx prisma migrate deploy  # run migrations
#   docker compose down                          # stop
#
# Notes:
#   - Database + Redis are containers in this stack. If you have an
#     external managed Postgres/Redis, comment those services out and
#     point DATABASE_URL / REDIS_URL at the external hosts.
#   - Healthcheck on the app container hits /api/health?live=1.
#   - Restart policy `unless-stopped` is the on-prem default. Use
#     `docker compose restart app` to roll a new image (after pulling).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: openproject-rewrite:latest
    container_name: openproject-rewrite
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      # All env vars come from .env.production (--env-file flag above)
      # Examples of what MUST be set:
      #   DATABASE_URL=postgresql://oprw:***@db:5432/openproject
      #   NEXTAUTH_URL=https://openproject.your-domain.com
      #   NEXTAUTH_SECRET=<32+ char random>
      #   REDIS_URL=redis://redis:6379
      #   SMTP_*, SENTRY_DSN, CRON_SECRET (see .env.production.example)
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health?live=1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - oprw-net

  db:
    image: postgres:16-alpine
    container_name: oprw-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-oprw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-openproject}
    volumes:
      - oprw-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oprw} -d ${POSTGRES_DB:-openproject}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oprw-net

  redis:
    image: redis:7-alpine
    container_name: oprw-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - oprw-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - oprw-net

volumes:
  oprw-db-data:
  oprw-redis-data:

networks:
  oprw-net:
    driver: bridge
